services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - OPENCLAW_STATE_DIR=/data/.openclaw
    volumes:
      - agent-data:/data
    restart: unless-stopped

volumes:
  agent-data:
